<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0D1A0F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BusCheck" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <title>BusCheck – Ledermair</title>
    <!-- Sofort-Skalierung: verhindert kleines Layout auf Android Chrome -->
    <script>
      (function() {
        var vw = window.innerWidth || document.documentElement.clientWidth || 360;
        // 360dp → 16px, 412dp → 18.4px, 480dp → 21.3px — clamp 14–22px
        var base = Math.min(22, Math.max(14, vw / 22.5));
        document.documentElement.style.fontSize = base + 'px';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
